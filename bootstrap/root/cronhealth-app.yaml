apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cronhealth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/colinbruner/homelab-cronhealth
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: cronhealth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
