## ArgoCD Helm values
## chart: argo/argo-cd 9.4.3 (app: v3.3.1)

global:
  image:
    tag: "v3.3.1"

configs:
  params:
    # TLS is terminated at ingress-nginx; run server in HTTP mode
    server.insecure: "true"
  cm:
    # Disable anonymous access
    users.anonymous.enabled: "false"

server:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  metrics:
    enabled: true

controller:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Disable Dex (SSO not configured)
dex:
  enabled: false
