apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: b3175a48-2ecd-44a1-be47-6c892bbff5c8
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      # Proxmox VE: routed directly to PVE nodes, bypassing Envoy Gateway.
      # Load balanced across 3 nodes via the proxmox Kubernetes Service + Endpoints.
      - hostname: "pve.colinbruner.com"
        service: https://proxmox.cloudflared.svc.cluster.local:8006
        originRequest:
          noTLSVerify: true

      # Wildcard rule: routes all matched hostnames to Envoy Gateway.
      # Only hostnames with Cloudflare DNS CNAME records pointing to the
      # tunnel will actually reach cloudflared — this is the access control.
      #
      - hostname: "*.colinbruner.com"
        service: https://envoy-proxy.envoy-gateway-system.svc.cluster.local:443
        originRequest:
          noTLSVerify: true
      # Catch-all: required by cloudflared
      - service: http_status:404
