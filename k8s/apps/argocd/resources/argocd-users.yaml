apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: https://argocd.colinbruner.com
  admin.enabled: "false"
  accounts.colin: login, apiKey
  kustomize.buildOptions: "--enable-helm"
  # Ignore Gateway API CRD server-side defaults (group/kind/weight on refs)
  # that otherwise cause permanent OutOfSync on HTTPRoute/Gateway resources.
  resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
    jqPathExpressions:
      - .spec.parentRefs[]?.group
      - .spec.parentRefs[]?.kind
      - .spec.rules[]?.backendRefs[]?.group
      - .spec.rules[]?.backendRefs[]?.kind
      - .spec.rules[]?.backendRefs[]?.weight
  resource.customizations.ignoreDifferences.gateway.networking.k8s.io_Gateway: |
    jqPathExpressions:
      - .spec.listeners[]?.tls.certificateRefs[]?.group
  oidc.config: |
    name: Pocket-ID
    issuer: https://auth.colinbruner.com
    clientID: $argocd-pocket-id-oauth:client_id
    clientSecret: $argocd-pocket-id-oauth:client_secret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    enablePKCEAuthentication: true
