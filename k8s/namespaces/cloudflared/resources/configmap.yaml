apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # NOTE: Replace TUNNEL_ID with your actual tunnel UUID after creating
    # the tunnel in the Cloudflare Zero Trust dashboard.
    tunnel: TUNNEL_ID
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      # Wildcard rule: routes all matched hostnames to Envoy Gateway.
      # Only hostnames with Cloudflare DNS CNAME records pointing to the
      # tunnel will actually reach cloudflared — this is the access control.
      #
      # Verify the Envoy proxy service name:
      #   kubectl get svc -n envoy-gateway-system
      - hostname: "*.colinbruner.com"
        service: https://envoy-gateway-system-shared-gateway.envoy-gateway-system.svc.cluster.local:443
        originRequest:
          noTLSVerify: true
      # Catch-all: required by cloudflared
      - service: http_status:404
