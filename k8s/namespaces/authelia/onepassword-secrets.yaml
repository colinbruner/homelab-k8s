# 1Password item path: vaults/lab/items/authelia
#
# Required fields in the 1Password item:
#   jwt_secret             - Random string (min 64 chars) for JWT signing
#   session_secret         - Random string (min 64 chars) for session encryption
#   storage_encryption_key - Random string (min 64 chars) for SQLite encryption
#
# Generate suitable values with:
#   openssl rand -hex 64
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: 1password-authelia
  namespace: authelia
spec:
  itemPath: "vaults/lab/items/authelia"
