apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authelia
  namespace: authelia
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    # Required headers so Authelia can set/read cookies and trust the proxy IP.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "200"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "200"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - auth.colinbruner.com
      secretName: authelia-tls
  rules:
    - host: auth.colinbruner.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authelia
                port:
                  number: 9091
