## Authentik Helm chart values
## chart: goauthentik/authentik 2025.12.4
##
## Social login (Google, Apple, GitHub, etc.) is configured post-deploy via
## Authentik's admin UI at https://auth.colinbruner.com/if/admin/ under
##   Directory → Federation & Social login → Sources → Create
## See social-login-blueprint.yaml in this directory for reference config.

global:
  # Mount blueprint ConfigMaps into the worker via a projected volume so
  # Authentik auto-discovers and applies all blueprints at startup.
  # Add new blueprint ConfigMaps to the sources list below.
  volumes:
    - name: blueprints
      projected:
        sources:
          - configMap:
              name: authentik-social-blueprints
          - configMap:
              name: authentik-forward-auth-blueprints
  volumeMounts:
    - name: blueprints
      mountPath: /blueprints/custom

  # Inject secrets from 1Password-managed k8s Secrets into all pods
  # (authentik server + authentik worker)
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: 1password-authentik
          key: secret_key
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: 1password-postgres
          key: password
    - name: GOOGLE_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: 1password-social
          key: google_client_id
    - name: GOOGLE_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: 1password-social
          key: google_client_secret
    - name: AUTHENTIK_REDIS__HOST
      value: "redis"

authentik:
  # Log level: debug | info | warning | error
  log_level: info

  # Cookie domain — must match the ingress host for SSO to work across subdomains
  cookie_domain: "colinbruner.com"

  # Email settings (optional — configure to enable email-based MFA / password reset)
  # email:
  #   host: smtp.example.com
  #   port: 587
  #   use_tls: true
  #   username: ""
  #   password: ""
  #   from: authentik@colinbruner.com

  postgresql:
    host: "postgres"
    name: authentik
    user: authentik
    # password sourced from AUTHENTIK_POSTGRESQL__PASSWORD env var above

server:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # HTTPRoute managed externally in httproute.yaml
  ingress:
    enabled: false
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false  # Enable when prometheus-operator is watching this namespace

worker:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# PostgreSQL and Redis run as standalone workloads (postgres.yaml / redis.yaml).
# The bundled subcharts are disabled.
postgresql:
  enabled: false

