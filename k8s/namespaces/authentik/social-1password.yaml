# 1Password vault item: vaults/lab/items/authentik-social-login
#
# Required fields in the 1Password item:
#   google_client_id     - OAuth 2.0 Client ID from Google Cloud Console
#   google_client_secret - OAuth 2.0 Client Secret from Google Cloud Console
#
# Create credentials at: https://console.cloud.google.com/apis/credentials
#   - Application type: Web application
#   - Authorised redirect URI: https://auth.colinbruner.com/source/oauth/callback/google/
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: 1password-social
  namespace: authentik
spec:
  itemPath: "vaults/lab/items/authentik-social-login"
