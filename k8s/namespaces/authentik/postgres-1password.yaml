# 1Password vault item: vaults/lab/items/authentik-postgres
#
# Required fields in the 1Password item:
#   username  - Database user (e.g. "authentik")
#   password  - Strong random password for the authentik database user
#
# Used by:
#   - postgres.yaml StatefulSet (sets POSTGRES_PASSWORD)
#   - The authentik server/worker (AUTHENTIK_POSTGRESQL__PASSWORD env var)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: 1password-postgres
  namespace: authentik
spec:
  itemPath: "vaults/lab/items/authentik-postgres"
