---
# Auth Proxy: nginx shim between Envoy ext_authz and Authentik's embedded outpost
#
# WHY THIS EXISTS:
#   Envoy's ext_authz HTTP service has two incompatibilities with Authentik's
#   embedded outpost nginx forward auth endpoint:
#
#   1. PATH MISMATCH — ext_authz always appends the original request path to the
#      configured path_prefix, producing paths like:
#        /outpost.goauthentik.io/auth/nginx/         (for requests to /)
#        /outpost.goauthentik.io/auth/nginx/metrics  (for requests to /metrics)
#      Authentik's Go outpost only handles the EXACT path:
#        /outpost.goauthentik.io/auth/nginx
#      and returns 404 for any trailing slash or subpath variation.
#
#   2. HOST MISMATCH — ext_authz sets the check request Host header from
#      server_uri (authentik-server.authentik:80), NOT the original request host.
#      Authentik's Go outpost does virtual-host routing: it matches the Host
#      header against each ProxyProvider's external_host to find the right
#      provider. With Host: authentik-server.authentik, no provider matches and
#      the request is proxied to Django which returns a generic 404.
#
# WHAT THIS DOES:
#   This nginx proxy sits between Envoy's ext_authz and Authentik.
#   It receives check requests (at any path, with any Host), and:
#     1. Rewrites the path to exactly /outpost.goauthentik.io/auth/nginx
#     2. Sets Host from X-Forwarded-Host (prometheus.colinbruner.com, etc.),
#        which is injected into every request by the Lua filter in
#        gateway-system/resources/envoy-patch-policy.yaml
#   This lets the Go outpost find the correct ProxyProvider by external_host
#   and perform the forward auth check properly.
#
# FLOW:
#   Browser → Cloudflared → Envoy (Lua adds X-Forwarded-Host) →
#   ext_authz check → this proxy → Authentik outpost (correct Host+path) →
#   200/302/401 back through the chain
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-proxy-config
  namespace: authentik
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        location / {
          # Rewrite any incoming path to the exact nginx auth endpoint.
          # ext_authz sends /outpost.goauthentik.io/auth/nginx/ (with trailing
          # slash or subpath); Authentik only handles the exact path.
          rewrite ^ /outpost.goauthentik.io/auth/nginx break;

          proxy_pass http://authentik-server.authentik:80;

          # Set Host to the original application host so the Go outpost can
          # match the request to the correct ProxyProvider by external_host.
          # X-Forwarded-Host is added by the Envoy Lua filter before ext_authz
          # runs, so it contains the original :authority (e.g. prometheus.colinbruner.com).
          set $auth_host $http_x_forwarded_host;
          if ($auth_host = "") {
            set $auth_host $host;
          }
          proxy_set_header Host $auth_host;

          # Forward the headers Authentik needs for the auth check.
          proxy_set_header X-Original-URL    $http_x_original_url;
          proxy_set_header X-Forwarded-Host  $http_x_forwarded_host;
          proxy_set_header X-Forwarded-Proto https;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $http_x_forwarded_for;

          # Auth checks don't include a request body.
          proxy_pass_request_body off;
          proxy_set_header Content-Length "";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-proxy
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-proxy
  template:
    metadata:
      labels:
        app: auth-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: config
        configMap:
          name: auth-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: auth-proxy
  namespace: authentik
spec:
  selector:
    app: auth-proxy
  ports:
  - port: 80
    targetPort: 80
