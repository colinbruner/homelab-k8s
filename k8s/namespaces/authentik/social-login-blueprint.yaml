---
# Authentik Blueprint: Social Login Sources
#
# This ConfigMap is mounted into the authentik-worker pod at /blueprints/custom/.
# Authentik automatically discovers and applies blueprints from this directory.
#
# HOW TO USE:
#   1. Create OAuth2 credentials in each provider's developer console:
#
#      Google:
#        https://console.cloud.google.com/apis/credentials
#        - Create OAuth 2.0 Client ID (Web application)
#        - Authorised redirect URI: https://auth.colinbruner.com/source/oauth/callback/google/
#
#      GitHub:
#        https://github.com/settings/developers → New OAuth App
#        - Authorization callback URL: https://auth.colinbruner.com/source/oauth/callback/github/
#
#      Apple:
#        https://developer.apple.com/account/resources/identifiers/list/serviceId
#        - Callback URL: https://auth.colinbruner.com/source/oauth/callback/apple/
#
#   2. Store credentials in 1Password:
#        Item: "Authentik Social Login" in vault "lab"
#        Fields:
#          google_client_id      google_client_secret
#          github_client_id      github_client_secret
#
#   3. Create OnePasswordItem resources and reference them in values.yaml global.env:
#        - name: GOOGLE_CLIENT_ID
#          valueFrom: { secretKeyRef: { name: 1password-social, key: google_client_id } }
#        - name: GOOGLE_CLIENT_SECRET
#          valueFrom: { secretKeyRef: { name: 1password-social, key: google_client_secret } }
#
#   4. Update the consumer_key / consumer_secret fields below with the env var
#      references (see Authentik blueprint env var interpolation syntax).
#
#   5. Set `enabled: true` for each provider you want active.
#
# NOTE: Blueprints are applied on worker startup. After credential updates,
# restart the worker pod to re-apply: kubectl rollout restart deploy/authentik-worker -n authentik
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-social-blueprints
  namespace: authentik
data:
  social-login.yaml: |
    version: 1
    metadata:
      name: Social Login Sources

    entries:
      # ── Google ─────────────────────────────────────────────────────────────
      # Best choice for family members — works with any Google/Gmail account.
      - model: authentik_sources_oauth.oauthsource
        state: present
        identifiers:
          slug: google
        attrs:
          name: Google
          enabled: false   # Set to true after adding credentials
          provider_type: google
          consumer_key: ""       # Replace with Google Client ID
          consumer_secret: ""    # Replace with Google Client Secret
          # Controls whether new users are created on first social login:
          user_matching_mode: identifier
          authentication_flow: !Find
            - authentik_flows.flow
            - [slug, default-source-authentication]
          enrollment_flow: !Find
            - authentik_flows.flow
            - [slug, default-source-enrollment]

      # ── GitHub ─────────────────────────────────────────────────────────────
      # Good secondary option; requires a GitHub account.
      - model: authentik_sources_oauth.oauthsource
        state: present
        identifiers:
          slug: github
        attrs:
          name: GitHub
          enabled: false   # Set to true after adding credentials
          provider_type: github
          consumer_key: ""       # Replace with GitHub Client ID
          consumer_secret: ""    # Replace with GitHub Client Secret
          user_matching_mode: identifier
          authentication_flow: !Find
            - authentik_flows.flow
            - [slug, default-source-authentication]
          enrollment_flow: !Find
            - authentik_flows.flow
            - [slug, default-source-enrollment]
