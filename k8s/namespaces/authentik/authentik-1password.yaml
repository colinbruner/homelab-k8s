# 1Password vault item: vaults/lab/items/authentik
#
# Required fields in the 1Password item:
#   secret_key  - Random 50+ character secret key (e.g. `openssl rand -hex 32`)
#
# The secret_key is Authentik's main cryptographic secret.
# Rotate with care — changing it invalidates all active sessions and tokens.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: 1password-authentik
  namespace: authentik
spec:
  itemPath: "vaults/lab/items/authentik"
