---
# SecurityPolicy: ext_authz forward authentication via Authentik.
#
# Protects the Grafana UI with Authentik SSO. Requests without a valid
# Authentik session are redirected to auth.colinbruner.com for login.
#
# Prerequisites (Authentik admin UI):
#   1. Create a Proxy Provider (forward auth, single application mode)
#      - External host: https://grafana.colinbruner.com
#   2. Create an Application linked to the provider
#   3. Assign the Application to the embedded outpost
#
# See k8s/namespaces/cloudflared/README.md for full setup instructions.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: authentik-ext-auth-grafana
  namespace: monitoring
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: grafana
  extAuth:
    http:
      backendRefs:
      - name: auth-proxy
        namespace: authentik
        port: 80
      headersToBackend:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      path: /outpost.goauthentik.io/auth/nginx
