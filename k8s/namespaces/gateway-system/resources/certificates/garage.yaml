apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: garage-tls
  namespace: gateway-system
spec:
  secretName: garage-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - garage.colinbruner.com
  - garage-admin.colinbruner.com
  - garage-internal.colinbruner.com
  - garage-admin-internal.colinbruner.com
