---
# EnvoyPatchPolicy: Inject X-Forwarded-Host and X-Original-URL headers
#
# WHY THIS EXISTS:
#   Envoy's ext_authz HTTP filter sends the auth check request to the
#   auth-proxy service (see k8s/namespaces/authentik/auth-proxy.yaml) using
#   the service address as the HTTP Host header, NOT the original request host.
#
#   The auth-proxy nginx then needs X-Forwarded-Host to know which application
#   host to forward to Authentik (so the Go outpost can route to the correct
#   Proxy Provider). X-Original-URL is also needed by the Authentik outpost's
#   nginx forward auth handler to identify the protected application.
#
#   Neither X-Forwarded-Host nor X-Original-URL is set automatically by Envoy
#   or cloudflared on inbound requests.
#
# WHAT THIS DOES:
#   Inserts a Lua HTTP filter at position 0 in the HTTPS listener's filter
#   chain, before both ext_authz filters. For every inbound request, the
#   Lua script reads the original :authority (Host) and :path pseudo-headers
#   and adds:
#     X-Forwarded-Host: <original-host>       (e.g. prometheus.colinbruner.com)
#     X-Original-URL:   https://<host><path>  (e.g. https://prometheus.colinbruner.com/)
#
#   These headers flow through the ext_authz check to the auth-proxy, which
#   sets the upstream Host to X-Forwarded-Host before proxying to Authentik.
#   The Go outpost then matches the Host to the correct Proxy Provider.
#
#   The headers are also visible to backend apps after auth passes, but
#   are harmless to Grafana, Prometheus, ArgoCD, etc.
#
# MAINTENANCE:
#   The JSONPatch path targets filter_chains/0/filters/0/typed_config/http_filters/0.
#   If the gateway listener structure changes (e.g. new SecurityPolicies add
#   more filter chains), verify the listener structure via:
#     kubectl port-forward -n envoy-gateway-system <envoy-pod> 19001:19000
#     curl -s http://localhost:19001/config_dump | <inspect http_filters>
#
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyPatchPolicy
metadata:
  name: authentik-forward-auth-headers
  namespace: gateway-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: shared-gateway
    namespace: gateway-system
  type: JSONPatch
  jsonPatches:
  - type: "type.googleapis.com/envoy.config.listener.v3.Listener"
    name: "gateway-system/shared-gateway/https"
    operation:
      op: add
      path: "/filter_chains/0/filters/0/typed_config/http_filters/0"
      value:
        name: "envoy.filters.http.lua"
        typed_config:
          "@type": "type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua"
          default_source_code:
            inline_string: |-
              function envoy_on_request(request_handle)
                local authority = request_handle:headers():get(":authority")
                local path = request_handle:headers():get(":path") or "/"
                if authority then
                  request_handle:headers():remove("X-Forwarded-Host")
                  request_handle:headers():remove("X-Original-URL")
                  request_handle:headers():add("X-Forwarded-Host", authority)
                  request_handle:headers():add("X-Original-URL", "https://" .. authority .. path)
                end
              end
