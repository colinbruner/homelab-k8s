apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crossplane-system

helmCharts:
  - name: crossplane
    repo: https://charts.crossplane.io/stable
    version: 2.3.2
    releaseName: crossplane
    namespace: crossplane-system

resources:
  - namespace.yaml
  # Crossplane HTTP provider and its Cloudflare config
  - resources/provider-http.yaml
  - resources/providerconfig-http-cloudflare.yaml
  # DNS
  - resources/cloudflare # NOTE: generated via generate.sh
