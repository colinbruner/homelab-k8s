apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-csi-root
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.10.5
  share: /var/nfs/shared/k8s
  subDir: namespaces/${pvc.metadata.namespace}/${pvc.metadata.name}
  mountPermissions: "0"    # no forced perms — subdirectory ownership follows the export's squash/root mapping
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - vers=3
  - nolock
