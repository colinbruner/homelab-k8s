apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-repo-config
  labels:
    {{- include "kopia.labels" . | nindent 4 }}
data:
  repository.config: |
    {
      "storage": {
        "type": "gcs",
        "config": {
          "bucket": {{ .Values.storage.gcsBucket | quote }},
          "credentialsFile": "/tmp/gcp/credentials.json"
        }
      },
      "caching": {
        "cacheDirectory": "/cache",
        "maxCacheSize": 5242880000,
        "maxMetadataCacheSize": 5242880000,
        "maxListCacheDuration": 30
      },
      "hostname": "kopia",
      "username": "root",
      "description": {{ include "kopia.repoDescription" . | quote }},
      "enableActions": true,
      "formatBlobCacheDuration": 900000000000
    }
