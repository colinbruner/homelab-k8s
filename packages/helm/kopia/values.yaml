image:
  repository: kopia/kopia
  tag: "0.23.1"
  pullPolicy: IfNotPresent

target:
  name: ""               # e.g. "documents" — drives PV name backup-<name>, PVC volumeName, repo description
  sourcePath: ""         # e.g. /Volumes/Documents — container mount path (mimics macOS path); also the kopia BACKUP_TARGET
  nfsPath: ""            # e.g. /var/nfs/shared/Documents — PV nfs.path
  schedule: "15 4 * * *" # kopia snapshot-time crontab
  description: ""        # optional; defaults to "UNAS <Name> Backup" if empty

storage:
  gcsBucket: ""          # GCS bucket name

nfs:
  server: "192.168.10.5"
  backupCapacity: "1Ti"  # PV capacity
  backupRequest: "1000Gi"
  configSize: "50Gi"     # dynamic config PVC (csi-nfs)

chronos:
  enabled: true
  pingBase: "https://chronos.bruner.family/ping"

secrets:
  password:
    name: backup         # OnePasswordItem-provided secret with key 'password'
  chronos:
    name: chronos        # secret with key 'token'
  gcpCredentials:
    name: gcp-credentials  # secret with key 'sa_json' mounted as credentials.json

resources:
  requests:
    cpu: 100m
    memory: 50Mi
  limits:
    cpu: 1000m
    memory: 1Gi
